version: "3.8"

# ============================================
# KG ElectroPower Voice Agent - Local Development
# ============================================
# Usage: docker-compose up -d redis postgres
# This starts only Redis and PostgreSQL for local development.
# The voice agent runs directly on your machine (not in Docker) during development.

services:
  # --- Redis (Session State) ---
  redis:
    image: redis:7-alpine
    container_name: voice_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- PostgreSQL (Database) ---
  postgres:
    image: postgres:16-alpine
    container_name: voice_agent_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:
